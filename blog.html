---
layout: post
title: "Posts"
---

<ul class="resume-item-list">
  {% for post in site.posts %}
  <li style="margin-bottom: 15px">
    <a href="{{ post.url | relative_url }}" style="
        text-decoration: none;
        color: inherit;
        font-weight: bold;
        font-size: 1.1em;
      ">
      {{ post.title }}
    </a>
  </li>
  {% endfor %}
</ul>
